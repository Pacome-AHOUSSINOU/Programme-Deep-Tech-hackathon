version: '3.8'

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_industrial
      POSTGRES_USER: smartuser
      POSTGRES_PASSWORD: smartpass123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://smartuser:smartpass123@postgres:5432/smart_industrial
      JWT_SECRET: changeme_in_production_super_secret_key_2024
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
  uploads:
